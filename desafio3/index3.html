        <button id="veri_pass" onclick="

        if(pass == '911'){

            let msj_pass = document.querySelector('#mensaje_pass');
            msj_pass.textContent = ('Password 1 correcto')
        }
        else if (pass == '714'){

            let msj_pass = document.querySelector('#mensaje_pass');

        } else {

        }
        
        ">Ingresar</button>
